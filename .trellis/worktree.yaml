# StoryBoard-Copilot 多 Agent worktree 配置
# 所有路径均相对于项目根目录。

#-------------------------------------------------------------------------------
# Paths
#-------------------------------------------------------------------------------

# 项目已有 `.worktrees/`，Trellis 子 worktree 统一放在该目录下。
worktree_dir: .worktrees/trellis

#-------------------------------------------------------------------------------
# Files to Copy
#-------------------------------------------------------------------------------

copy:
  # 如未来需要在 worktree 中独立联调供应商密钥，可按需打开环境文件复制。
  # - .env
  # - .env.local
  - .trellis/.developer

#-------------------------------------------------------------------------------
# Post-Create Hooks
#-------------------------------------------------------------------------------

# 创建 worktree 后默认不自动安装依赖，避免隐式网络访问。
# 需要完整独立环境时可手动启用 npm install。
post_create:
  # - npm install

#-------------------------------------------------------------------------------
# Check Agent Verification (Ralph Loop)
#-------------------------------------------------------------------------------

# 默认不强制自动验证，具体任务按 `.trellis/workflow.md` 的项目验证命令执行。
# 若某个多 Agent 任务需要强门禁，可启用下列真实命令。
verify:
  # - npx tsc --noEmit
  # - npm test
  # - cd src-tauri && cargo check
