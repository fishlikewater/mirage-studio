# cowork-flow Configuration
# Project-level settings for the cowork-flow workflow system
#
# All values have sensible defaults. Only override what you need.

#-------------------------------------------------------------------------------
# Session Recording
#-------------------------------------------------------------------------------

# Commit message used when auto-committing journal/index changes
# after running add_session.py
session_commit_message: "chore: record journal"

# Maximum lines per journal file before rotating to a new one
max_journal_lines: 2000

#-------------------------------------------------------------------------------
# Codex Runtime
#-------------------------------------------------------------------------------

# This controls only the injected workflow hint (<codex-mode>...).
# It does not force dispatch or disable tools at runtime.
# sub-agent: hint that main session should dispatch cowork-* fixed agents.
# inline: hint that main session should perform implementation/check directly.
codex:
  dispatch_mode: "sub-agent"

#-------------------------------------------------------------------------------
# Task Lifecycle Hooks
#-------------------------------------------------------------------------------

# Commands to run after task lifecycle events.
# Each hook receives TASK_JSON_PATH environment variable pointing to task.json.
# Commands use simple executable plus arguments and run without a shell.
# No shell pipes, redirects, or command chaining (|, >, &&).
# Hook failures print a warning but do not block the main operation.
#
# hooks:
#   after_create:
#     - "python scripts/on_task_event.py after_create"
#   after_start:
#     - "python scripts/on_task_event.py after_start"
#   after_finish:
#     - "python scripts/on_task_event.py after_finish"
#   after_archive:
#     - "python scripts/on_task_event.py after_archive"
