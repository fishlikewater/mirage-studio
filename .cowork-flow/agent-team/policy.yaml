# Agent Team Policy

parallel:
  allow_parallel_batches: true
  disallow_file_write_conflicts: true
  require_coordinator_review: true

reviews:
  require_spec_review: true
  require_quality_review: true
  chain:
    - implementer
    - spec-reviewer
    - quality-reviewer

retry:
  max_attempts: 3
  retry_on:
    - needs_context
    - failed_verification
    - review_rejected
    - adapter_failed
  escalation: needs-coordinator-decision
